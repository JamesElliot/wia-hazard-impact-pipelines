name: wia-hazard-pipelines

channels:
  - conda-forge
  - defaults

dependencies:
  # Core Python
  - python=3.11
  - pip

  # Scientific stack
  - numpy>=1.26,<2.0
  - pandas>=2.1,<3.0
  - xarray>=2023.0
  - dask>=2023.0
  - netcdf4>=1.6
  - matplotlib>=3.8

  # Geospatial stack
  - geopandas>=0.14
  - shapely>=2.0
  - rasterio>=1.3
  - rasterstats>=0.19
  - pyproj>=3.6
  - fiona>=1.9
  - affine>=2.4
  - rioxarray>=0.15

  # STAC / EO
  - pystac-client>=0.7
  - odc-stac>=0.3
  - odc-geo>=0.4

  # Climate API
  - cdsapi>=0.6
  - jsonschema>=4.0

  # Jupyter support (recommended for notebooks)
  - jupyterlab>=4.0
  - ipykernel

  # Testing and utilities
  - pytest>=7.0
  - tqdm
  - requests
  - pyyaml>=6.0
